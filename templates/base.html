<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard{% endblock %} | Paddy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --bg-card: #1a1d23;
            --bg-body: #12151a;
            --text-muted: #8b9298;
            --accent: #3b82f6;
        }
        body {
            background: var(--bg-body);
            color: #e5e5e5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .card {
            background: var(--bg-card);
            border: 1px solid #2d333b;
            border-radius: 12px;
        }
        .card-header {
            background: rgba(0,0,0,0.2);
            border-bottom: 1px solid #2d333b;
            font-weight: 600;
            padding: 12px 16px;
        }
        .stat-card {
            background: var(--bg-card);
            border: 1px solid #2d333b;
            border-radius: 12px;
        }
        .stat-card .stat-icon {
            font-size: 2rem;
            margin-bottom: 8px;
        }
        .stat-card .stat-value {
            font-size: 1.75rem;
            font-weight: 700;
        }
        .stat-card .stat-label {
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        .page-header {
            margin-bottom: 24px;
        }
        .page-title {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .table {
            color: #e5e5e5;
        }
        .table-dark {
            --bs-table-bg: #1a1d23;
        }
        .table-hover tbody tr:hover {
            background-color: rgba(59, 130, 246, 0.08);
        }
        .badge {
            font-weight: 500;
        }
        code {
            color: #79c0ff;
            background: rgba(59, 130, 246, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
        }
        .list-group-item {
            background: transparent;
            border-color: #2d333b;
        }
        .nav-tabs {
            border-bottom: 1px solid #2d333b;
        }
        .nav-tabs .nav-link {
            color: var(--text-muted);
            border: none;
            border-bottom: 2px solid transparent;
            padding: 12px 16px;
        }
        .nav-tabs .nav-link:hover {
            color: #e5e5e5;
            border-color: transparent;
        }
        .nav-tabs .nav-link.active {
            color: #3b82f6;
            background: transparent;
            border-bottom-color: #3b82f6;
        }
        .text-success { color: #3fb950 !important; }
        .text-danger { color: #f85149 !important; }
        .text-warning { color: #d29922 !important; }
        .text-info { color: #58a6ff !important; }
        .bg-success { background-color: #238636 !important; }
        .bg-danger { background-color: #da3633 !important; }
        .bg-warning { background-color: #9e6a03 !important; }
        .bg-info { background-color: #1f6feb !important; }
        .bg-primary { background-color: #1f6feb !important; }
        .bg-secondary { background-color: #6e7681 !important; }
        .alert-danger {
            background: rgba(248, 81, 73, 0.1);
            border-color: rgba(248, 81, 73, 0.3);
            color: #f85149;
        }
    </style>
</head>
<body>
    <!-- Nav -->
    <nav class="navbar navbar-expand-lg mb-4" style="background: var(--bg-card); border-bottom: 1px solid #2d333b;">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" href="/">
                <i class="bi bi-robot me-2"></i>Paddy Dashboard
            </a>
            <div class="navbar-nav ms-auto flex-row gap-2">
                <a class="nav-link px-3 {{ 'active' if request.path == '/summary' else '' }}" href="/summary">
                    <i class="bi bi-house me-1"></i>Summary
                </a>
                <a class="nav-link px-3 {{ 'active' if request.path == '/sales' else '' }}" href="/sales">
                    <i class="bi bi-currency-dollar me-1"></i>Sales
                </a>
                <a class="nav-link px-3 {{ 'active' if request.path == '/polymarket' else '' }}" href="/polymarket">
                    <i class="bi bi-graph-up me-1"></i>Polymarket
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container-fluid px-4 pb-4">
        {% block content %}{% endblock %}
    </div>

    <!-- Auto-refresh (every 30s) -->
    <meta http-equiv="refresh" content="30">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
