<!DOCTYPE html>
<html lang="zh-TW" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard{% endblock %} | Paddy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-card: #21262d;
            --border-color: #30363d;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --accent-blue: #58a6ff;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-yellow: #d29922;
            --accent-purple: #a371f7;
        }
        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }
        .navbar {
            background-color: var(--bg-secondary) !important;
            border-bottom: 1px solid var(--border-color);
        }
        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
        }
        .card-header {
            background-color: transparent;
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
        }
        .stat-card {
            text-align: center;
            padding: 1.5rem;
        }
        .stat-card .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent-blue);
        }
        .stat-card .stat-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .table {
            color: var(--text-primary);
        }
        .table-dark {
            --bs-table-bg: var(--bg-card);
            --bs-table-border-color: var(--border-color);
        }
        .badge-tasks { background-color: var(--accent-blue); }
        .badge-events { background-color: var(--accent-purple); }
        .badge-crons { background-color: var(--accent-yellow); }
        .badge-projects { background-color: var(--accent-green); }
        .badge-overdue { background-color: var(--accent-red); }
        .nav-link {
            color: var(--text-primary) !important;
            border-radius: 8px;
            margin: 0 4px;
            transition: all 0.2s;
        }
        .nav-link:hover, .nav-link.active {
            background-color: var(--bg-card) !important;
            color: var(--accent-blue) !important;
        }
        .nav-link i {
            margin-right: 6px;
        }
        .page-header {
            padding: 1.5rem 0;
            margin-bottom: 1.5rem;
        }
        .page-title {
            font-size: 1.75rem;
            font-weight: 700;
            margin: 0;
        }
        .section-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 1rem;
        }
        .list-group-item {
            background-color: var(--bg-card);
            border-color: var(--border-color);
            color: var(--text-primary);
        }
        .badge {
            font-weight: 500;
        }
        .text-muted {
            color: var(--text-secondary) !important;
        }
        .footer {
            background-color: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            padding: 1rem 0;
            margin-top: 3rem;
        }
        .refresh-time {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        @media (max-width: 768px) {
            .stat-card .stat-number {
                font-size: 2rem;
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/">
                <i class="bi bi-grid-3x3-gap-fill text-primary"></i>
                Dashboard
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'summary' %}active{% endif %}" href="/summary">
                            <i class="bi bi-house"></i>總覽
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'sales' %}active{% endif %}" href="/sales">
                            <i class="bi bi-currency-dollar"></i>銷售
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'polymarket' %}active{% endif %}" href="/polymarket">
                            <i class="bi bi-graph-up"></i>Polymarket
                        </a>
                    </li>
                </ul>
                <span class="refresh-time ms-3">
                    <i class="bi bi-clock"></i>
                    <span id="current-time"></span>
                </span>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container-fluid py-3 px-4">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="footer text-center">
        <div class="container">
            <small class="text-muted">
                <i class="bi bi-arrow-repeat"></i> 數據每 30 秒自動刷新
                &nbsp;|&nbsp;
                <span class="text-muted">最後更新: <span id="last-update">-</span></span>
            </small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Update current time
        function updateTime() {
            const now = new Date();
            const options = {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false,
                timeZoneName: 'short'
            };
            document.getElementById('current-time').textContent = now.toLocaleTimeString('zh-TW', options);
            document.getElementById('last-update').textContent = now.toLocaleTimeString('zh-TW', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            });
        }
        updateTime();
        setInterval(updateTime, 1000);

        // Auto-refresh page every 30 seconds
        setTimeout(() => {
            location.reload();
        }, 30000);
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
